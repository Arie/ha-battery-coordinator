[project]
name = "ha-addon-battery-coordinator"
version = "1.1.1"
description = "Coordinates Zendure battery with HomeWizard Plug-in Batteries for Home Assistant"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "aiohttp>=3.9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["battery-coordinator/app", "tests"]

[tool.ruff]
line-length = 120

[tool.ruff.lint]
# E402: imports after sys.path manipulation (required for app module path)
per-file-ignores = {"tests/*.py" = ["E402"]}

[dependency-groups]
dev = [
    "pyyaml>=6.0.3",
    "ruff>=0.15.9",
]
