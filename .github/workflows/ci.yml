name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff check)
        run: uv run ruff check battery-coordinator/app/ tests/

      - name: Format check (ruff format --check)
        run: uv run ruff format --check battery-coordinator/app/ tests/

      - name: Tests (pytest)
        run: uv run python -m pytest tests/ -q
